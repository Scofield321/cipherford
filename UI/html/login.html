<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - DecipherCoded</title>
    <link rel="stylesheet" href="/UI/css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <p class="company-name">cipherford</p>
      <p>Don't have an account? <a href="create-account.html">Sign Up</a></p>
      <div class="user-inputs">
        <input id="login-email" type="email" placeholder="Enter Email" />
        <input
          id="login-password"
          type="password"
          placeholder="Enter Password"
        />
      </div>
      <button id="login-btn" class="login-btn">Login</button>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
