<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <link rel="stylesheet" href="/UI/css/create-account.css" />
  </head>
  <body>
    <div class="create-account-container">
      <p class="company-name">DecipherCoded</p>
      <p>
        Have an account already?
        <a href="login.html">Login Here</a>
      </p>

      <div class="user-inputs">
        <input id="signup-username" type="text" placeholder="Enter Full Name" />
        <input id="email" type="email" placeholder="Enter Email" />
        <input id="country" type="text" placeholder="Enter Country" />
        <input
          id="signup-password"
          type="password"
          placeholder="Enter Password"
        />

        <!-- Parent-specific inputs -->
        <div id="parent-extra-fields" style="display: none">
          <input id="wechat" type="text" placeholder="WeChat (Parents only)" />
          <input
            id="child-email"
            type="email"
            placeholder="Enter Child's Email (student)"
          />
        </div>

        <!-- Student-specific input -->
        <div id="student-extra-fields" style="display: none">
          <input
            id="parent-email"
            type="email"
            placeholder="Enter Parent's Email (optional)"
          />
        </div>

        <!-- Role selection -->
        <div class="role-selection">
          <input type="radio" id="parent" name="role" value="parent" />
          <label for="parent">Parent</label>
          <input type="radio" id="student" name="role" value="student" />
          <label for="student">Student</label>
        </div>
      </div>

      <button id="create-account-btn" class="create-account-btn">
        Create Account
      </button>
    </div>

    <script>
      // Show/hide fields based on role selection
      document.querySelectorAll('input[name="role"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          const parentFields = document.getElementById("parent-extra-fields");
          const studentFields = document.getElementById("student-extra-fields");

          if (document.getElementById("parent").checked) {
            parentFields.style.display = "block";
            studentFields.style.display = "none";
          } else if (document.getElementById("student").checked) {
            parentFields.style.display = "none";
            studentFields.style.display = "block";
          } else {
            parentFields.style.display = "none";
            studentFields.style.display = "none";
          }
        });
      });
    </script>

    <script src="/js/auth.js"></script>
  </body>
</html>
