<section class="manage-students">
  <h2>Manage Students</h2>

  <!-- 🔍 Search and Filter -->
  <div class="search-bar">
    <input
      type="text"
      id="student-search"
      placeholder="Search by name or email..."
    />
    <button class="btn btn-primary">Search</button>
  </div>

  <!-- 📋 Student Table -->
  <div class="table-wrapper">
    <table class="students-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Plan</th>
          <th>Progress</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Populated via JS -->
      </tbody>
    </table>
  </div>

  <!-- Edit Student Modal -->
  <div id="edit-student-modal" class="modal" style="display: none">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h3>Edit Student Info</h3>
      <form id="edit-student-form">
        <input
          type="text"
          id="edit-username"
          placeholder="Full Name"
          required
        />
        <input type="number" id="edit-level" placeholder="Level" min="1" />
        <input type="number" id="edit-points" placeholder="Points" min="0" />
        <input
          type="number"
          id="edit-projects"
          placeholder="Projects Done"
          min="0"
        />
        <input
          type="number"
          id="edit-attendance-week"
          placeholder="Attendance (Week)"
          min="0"
        />
        <input
          type="number"
          id="edit-attendance-month"
          placeholder="Attendance (Month)"
          min="0"
        />
        <input
          type="text"
          id="edit-plan"
          placeholder="Plan (Free / Standard / Premium)"
        />

        <!-- Upcoming Sessions -->
        <div>
          <label>Upcoming Sessions:</label>
          <div id="upcoming-sessions-container">
            <!-- JS will populate session fields here -->
          </div>
          <button type="button" id="add-session-btn">+ Add Session</button>
        </div>

        <button type="submit">Save Changes</button>
      </form>
    </div>
  </div>
</section>

<script src="/js/manage-students.js"></script>
